# Cloudflare Tunnel config for fd-whatsapp-worker.
#
# --- Quick tunnel (testing, no account needed) ---
#   cloudflared tunnel --url http://localhost:3001
#   Prints a free https://<random>.trycloudflare.com URL. No config file used.
#
# --- Named tunnel (production, requires Cloudflare account) ---
#   cloudflared tunnel login
#   cloudflared tunnel create fd-worker          # saves credentials JSON + prints UUID
#   Update credentials-file below with the UUID, then:
#   sudo cp deploy/cloudflared.config.yml /etc/cloudflared/config.yml
#   sudo cloudflared service install
#
# The tunnel is reachable at https://<tunnel-id>.cfargotunnel.com once running.
# To use a custom domain later:
#   cloudflared tunnel route dns fd-worker <your-hostname>
#   Add a hostname block to ingress below.

tunnel: fd-worker
credentials-file: /etc/cloudflared/<tunnel-id>.json

ingress:
  - service: http://127.0.0.1:3001

# Local metrics endpoint — useful for `curl http://127.0.0.1:9090/metrics`
# during incident triage. Not exposed publicly.
metrics: 127.0.0.1:9090
